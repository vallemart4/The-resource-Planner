<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resource Planner</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
</head>
<body>
<div class="app">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="logo"><span class="logo-dot"></span> Resource Planner</div>
    <div class="nav-section">Views</div>
    <div class="nav-item active" onclick="setTab('dashboard')"><span class="nav-icon">🏠</span> Dashboard</div>
    <div class="nav-item" onclick="setTab('overview')"><span class="nav-icon">⊞</span> Overview</div>
    <div class="nav-item" onclick="setTab('projects')"><span class="nav-icon">💼</span> Projects</div>
    <div class="nav-item" onclick="setTab('services')"><span class="nav-icon">🔧</span> Base Services</div>
    <div class="sidebar-div"></div>
    <div id="sidebar-teams-section">
    <div class="nav-section">Teams</div>
    <div class="nav-item" id="nav-dev" onclick="openTeam('Development')"><span class="nav-icon">💻</span> Development</div>
    <div class="nav-item" id="nav-plat" onclick="openTeam('Platform')"><span class="nav-icon">☁</span> Platform</div>
    <div class="nav-item" id="nav-pmo" onclick="openTeam('PMO')"><span class="nav-icon">📊</span> PMO</div>
    <div class="sidebar-div"></div>
    <div class="nav-section">Work</div>
    <div class="nav-item" id="nav-inbox" onclick="setTab('inbox')"><span class="nav-icon">📥</span> Inbox</div>
    <div class="nav-item" id="nav-pipeline" onclick="setTab('pipeline')"><span class="nav-icon">⏳</span> Pipeline</div>
    <div class="sidebar-div"></div>
    <div class="nav-item" onclick="setTab('add')"><span class="nav-icon">📋</span> Planning mode</div>
    </div>
    <div class="sidebar-foot" id="foot">0 assignments · 0 projects</div>
    <div style="padding:10px 18px;border-top:1px solid #e5e7eb;display:flex;flex-direction:column;gap:6px">
      <button onclick="exportData()" style="font-size:11px;color:#0f6e56;background:#f0fdf8;border:1px solid #6ee7b7;border-radius:6px;cursor:pointer;font-family:DM Sans,sans-serif;padding:5px 8px;text-align:left">💾 Export backup</button>
      <button onclick="importData()" style="font-size:11px;color:#185fa5;background:#eff6ff;border:1px solid #93c5fd;border-radius:6px;cursor:pointer;font-family:DM Sans,sans-serif;padding:5px 8px;text-align:left">📂 Import backup</button>
      <button onclick="importExcel()" style="font-size:11px;color:#7c3aed;background:#f5f3ff;border:1px solid #c4b5fd;border-radius:6px;cursor:pointer;font-family:DM Sans,sans-serif;padding:5px 8px;text-align:left">📊 Import from Excel</button>
      <button onclick="clearData()" style="font-size:11px;color:#9ca3af;background:none;border:none;cursor:pointer;font-family:DM Sans,sans-serif;padding:0;text-align:left">🗑 Clear all data</button>
    </div>
  </div>
  <!-- Main -->
  <div class="main">
    <div class="topbar">
      <span class="topbar-title" id="tab-title">Dashboard</span>
      <div class="topbar-right">
        <button class="dark-toggle" onclick="toggleDark()" id="dark-btn">🌙 Dark</button>
        <div class="role-pill">
          👤 <select id="role-sel" onchange="render()">
            <option value="Teamlead">Teamlead</option>
            <option value="Project Manager">Project Manager</option>
            <option value="Team Member">Team Member</option>
            <option value="Manager">Manager</option>
          </select>
        </div>
        <input class="name-input" id="user-name" value="Martina Vallgren" placeholder="Your name" />
      </div>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>
  <script src="script.js"></script>
</body>
</html>
